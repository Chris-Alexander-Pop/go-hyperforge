name: Close orphan PRs
on:
  workflow_dispatch:
permissions:
  pull-requests: write
  contents: read
jobs:
  close:
    runs-on: ubuntu-latest
    steps:
      - name: Close duplicate/orphan open PRs (keep 284 and 285)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          keep="284 285"
          mapfile -t nums < <(gh pr list --repo "$GH_REPO" --state open --limit 300 --json number --jq '.[].number')
          for num in "${nums[@]}"; do
            skip=false
            for k in $keep; do
              if [ "$num" = "$k" ]; then skip=true; break; fi
            done
            if $skip; then
              echo "keep #$num"
              continue
            fi
            echo "closing #$num"
            gh pr close "$num" --repo "$GH_REPO" --comment "Closing: head branch deleted during branch cleanup; unique fixes consolidated in #285."
          done
