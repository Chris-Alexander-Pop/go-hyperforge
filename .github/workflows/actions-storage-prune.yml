# Keeps Actions artifact/cache storage from growing unbounded.
# - Artifacts: keep only the newest per name
# - Caches: drop PR/tag refs; keep one CodeQL overlay; drop caches idle >14d
name: Prune Actions storage

on:
  schedule:
    - cron: "17 7 * * 1" # Mondays 07:17 UTC
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  prune:
    runs-on: ubuntu-latest
    steps:
      - name: Prune artifacts and caches
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const idleMs = 14 * 24 * 60 * 60 * 1000;
            const now = Date.now();

            const artifacts = await github.paginate(
              github.rest.actions.listArtifactsForRepo,
              { owner, repo, per_page: 100 }
            );
            const byName = new Map();
            for (const a of artifacts) {
              if (a.expired) continue;
              const list = byName.get(a.name) || [];
              list.push(a);
              byName.set(a.name, list);
            }
            let artsDeleted = 0;
            for (const [, list] of byName) {
              list.sort((a, b) => Date.parse(b.created_at) - Date.parse(a.created_at));
              for (const a of list.slice(1)) {
                await github.rest.actions.deleteArtifact({ owner, repo, artifact_id: a.id });
                artsDeleted++;
                core.info(`Deleted artifact ${a.name} id=${a.id}`);
              }
            }

            const { data: repoInfo } = await github.rest.repos.get({ owner, repo });
            const defaultRef = `refs/heads/${repoInfo.default_branch}`;

            // getActionsCacheList uses a non-standard collection key; page manually.
            const caches = [];
            for (let page = 1; ; page++) {
              const { data } = await github.rest.actions.getActionsCacheList({
                owner, repo, per_page: 100, page,
              });
              const batch = data.actions_caches || [];
              caches.push(...batch);
              if (batch.length < 100) break;
            }

            const newestCodeql = caches
              .filter((c) => (c.key || "").toLowerCase().includes("codeql"))
              .sort((a, b) => Date.parse(b.last_accessed_at) - Date.parse(a.last_accessed_at))[0];
            const keepCodeqlId = newestCodeql ? newestCodeql.id : null;

            let cachesDeleted = 0;
            for (const c of caches) {
              const ref = c.ref || "";
              const key = c.key || "";
              const last = Date.parse(c.last_accessed_at || c.created_at || 0);
              const isPrOrTag = ref.startsWith("refs/pull/") || ref.startsWith("refs/tags/");
              const isIdle = now - last > idleMs;
              const isExtraCodeql =
                key.toLowerCase().includes("codeql") && c.id !== keepCodeqlId;

              if (c.id === keepCodeqlId && !isPrOrTag) continue;
              if (!(isPrOrTag || isIdle || isExtraCodeql)) continue;

              await github.rest.actions.deleteActionsCacheById({ owner, repo, cache_id: c.id });
              cachesDeleted++;
              core.info(`Deleted cache id=${c.id} ref=${ref} key=${key.slice(0, 80)}`);
            }

            core.summary
              .addHeading("Actions storage prune")
              .addList([
                `Artifacts deleted: ${artsDeleted}`,
                `Caches deleted: ${cachesDeleted}`,
                `Default ref: ${defaultRef}`,
              ])
              .write();
            core.info(`Pruned ${artsDeleted} artifacts, ${cachesDeleted} caches`);
