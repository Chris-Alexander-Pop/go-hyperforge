run:
  timeout: 10m
  tests: false

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - typecheck
    - unused
    - gofmt
    - goimports
    - misspell
    - revive
    - gocyclo
    - goconst
    - gocritic
    - unconvert
    - nakedret
    - prealloc

linters-settings:
  gocyclo:
    # Large adapter/state-machine helpers exceed 20 without being unreadable.
    min-complexity: 30
  goconst:
    min-len: 3
    min-occurrences: 4
  revive:
    severity: warning
    rules:
      - name: exported
        disabled: true
      - name: package-comments
        disabled: false
  gocritic:
    enabled-tags:
      - diagnostic
      - experimental
      - opinionated
      - performance
      - style
    disabled-checks:
      - whyNoLint
      - wrapperFunc
      - hugeParam
      - paramTypeCombine
      - unnamedResult
      - captLocal
      - builtinShadow
      - commentedOutCode
      - ifElseChain
      - nestingReduce
      - emptyStringTest
      - rangeValCopy
      - octalLiteral
      - assignOp
      - emptyFallthrough
      - typeAssertChain
      - valSwap
      - appendAssign
      - sprintfQuotedString
      - elseif
      - builtinShadowDecl
      - httpNoBody
      - equalFold
      - preferFprint
      - deferInLoop

issues:
  exclude-rules:
    # Third-party SDK deprecations we still need until EndpointSlice/credential APIs migrate.
    - linters: [staticcheck]
      text: "SA1019:"
    # Signature stability for public helpers outweighs unused-result noise.
    - linters: [unparam]
      path: ".*"
